# Reusable CI workflow for DuetWebControl (Vue 3) plugins.
#
# In a plugin repo, add .github/workflows/ci.yml:
#
#   name: CI
#   on: [push, pull_request]
#   jobs:
#     test:
#       uses: jaysuk/dwc-plugin-test-kit/.github/workflows/dwc-plugin-ci.yml@main
#
name: DWC plugin CI

on:
  workflow_call:
    inputs:
      dwc-repo:
        description: DuetWebControl repository to build/type-check against.
        type: string
        default: Duet3D/DuetWebControl
      dwc-ref:
        description: DuetWebControl branch/tag/sha.
        type: string
        default: next
      kit-ref:
        description: dwc-plugin-test-kit ref.
        type: string
        default: main

jobs:
  unit:
    name: Unit + mount tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { path: plugin }
      - uses: actions/checkout@v5
        with:
          repository: jaysuk/dwc-plugin-test-kit
          ref: ${{ inputs.kit-ref }}
          path: dwc-plugin-test-kit
      - uses: actions/setup-node@v5
        with: { node-version: 20, cache: npm, cache-dependency-path: plugin/package-lock.json }
      - name: Install plugin
        working-directory: plugin
        run: npm install
      - name: Run tests (with coverage if the plugin defines test:coverage)
        working-directory: plugin
        run: |
          if [ "$(node -p "!!(require('./package.json').scripts||{})['test:coverage']")" = "true" ]; then
            npm run test:coverage
          else
            npm test
          fi

  build-and-typecheck:
    name: Build + type-check against DWC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { path: plugin }
      - uses: actions/checkout@v5
        with:
          repository: jaysuk/dwc-plugin-test-kit
          ref: ${{ inputs.kit-ref }}
          path: dwc-plugin-test-kit
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.dwc-repo }}
          ref: ${{ inputs.dwc-ref }}
          path: DuetWebControl
      - uses: actions/setup-node@v5
        with: { node-version: 20 }
      - name: Install DuetWebControl
        working-directory: DuetWebControl
        run: npm install
      - name: Install plugin (and its bundled deps into DWC for type-checking)
        working-directory: plugin
        run: |
          npm install
          # Install the plugin's runtime deps into DWC so vue-tsc can resolve them. Use each dep's
          # package.json spec: the value for github:/url/path deps (a bare github-only name would 404
          # on the npm registry), else name@version for registry deps.
          SPECS=$(node -p "Object.entries(require('./package.json').dependencies||{}).map(([k,v])=>v.includes(':')||v.includes('/')?v:k+'@'+v).join(' ')")
          if [ -n "$SPECS" ]; then (cd ../DuetWebControl && npm install --no-save $SPECS); fi
      - name: Verify build (installable ZIP, correctly externalised)
        working-directory: plugin
        env:
          DWC_DIR: ${{ github.workspace }}/DuetWebControl
        run: npm run verify-build
      - name: Type-check
        working-directory: plugin
        env:
          DWC_DIR: ${{ github.workspace }}/DuetWebControl
        run: npm run typecheck
